events {}

http {
    upstream immich_upstream {
        server immich-test-server:2283;
    }

    server {
        listen 2283;

        # Inject a 503 on the upload endpoint so the rollback path is exercised
        # against a real HTTP error, not a client mock. All other endpoints
        # pass through untouched.
        location = /api/assets {
            if ($request_method = POST) {
                return 503 "injected upload failure";
            }
            proxy_pass http://immich_upstream;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://immich_upstream;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            client_max_body_size 0;
            proxy_set_header Host $host;
        }
    }
}
