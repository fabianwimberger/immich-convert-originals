<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Immich Library Converter</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%2315120e'/%3E%3Cg fill='%23e2611f' transform='translate(12 12)'%3E%3Crect x='-1.15' y='-9' width='2.3' height='7' rx='1.15'/%3E%3Crect x='-1.15' y='-9' width='2.3' height='7' rx='1.15' transform='rotate(60)'/%3E%3Crect x='-1.15' y='-9' width='2.3' height='7' rx='1.15' transform='rotate(120)'/%3E%3Crect x='-1.15' y='-9' width='2.3' height='7' rx='1.15' transform='rotate(180)'/%3E%3Crect x='-1.15' y='-9' width='2.3' height='7' rx='1.15' transform='rotate(240)'/%3E%3Crect x='-1.15' y='-9' width='2.3' height='7' rx='1.15' transform='rotate(300)'/%3E%3C/g%3E%3C/svg%3E" />
</head>
<body>
  <header class="app-header">
    <div class="wordmark">
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
        <g fill="currentColor" transform="translate(12 12)">
          <rect x="-1.15" y="-9" width="2.3" height="7" rx="1.15" />
          <rect x="-1.15" y="-9" width="2.3" height="7" rx="1.15" transform="rotate(60)" />
          <rect x="-1.15" y="-9" width="2.3" height="7" rx="1.15" transform="rotate(120)" />
          <rect x="-1.15" y="-9" width="2.3" height="7" rx="1.15" transform="rotate(180)" />
          <rect x="-1.15" y="-9" width="2.3" height="7" rx="1.15" transform="rotate(240)" />
          <rect x="-1.15" y="-9" width="2.3" height="7" rx="1.15" transform="rotate(300)" />
        </g>
      </svg>
      <div class="titles">
        <h1>Immich Library Converter</h1>
        <p class="tagline">Originals &rarr; JPEG XL &middot; AV1</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="browse">Browse</button>
      <button class="tab-btn" data-tab="convert">Convert</button>
      <button class="tab-btn" data-tab="history">History</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>
  </header>
  <main id="app">
    <div id="tab-browse" class="tab-panel active"></div>
    <div id="tab-convert" class="tab-panel"></div>
    <div id="tab-history" class="tab-panel"></div>
    <div id="tab-settings" class="tab-panel"></div>
  </main>
  <script src="js/format-utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/websocket-client.js"></script>
  <script src="js/settings-fields.js"></script>
  <script src="js/settings-panel.js"></script>
  <script src="js/asset-browser.js"></script>
  <script src="js/active-run.js"></script>
  <script src="js/run-panel.js"></script>
  <script src="js/run-history.js"></script>
  <script src="js/app.js"></script>

</html>
