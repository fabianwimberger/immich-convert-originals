name: immich-convert-test

services:
  immich-test-server:
    container_name: immich-test-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_TEST_TAG:-v3.0.3}
    ports:
      - "127.0.0.1:${IMMICH_TEST_PORT}:2283"
    environment:
      IMMICH_VERSION: ${IMMICH_TEST_TAG:-v3.0.3}
      DB_HOSTNAME: immich-test-postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-test-redis
      REDIS_PORT: 6379
      UPLOAD_LOCATION: /data
    volumes:
      - immich-test-uploads:/data
    networks:
      - immich-test-net
    depends_on:
      immich-test-postgres:
        condition: service_started
      immich-test-redis:
        condition: service_started
    healthcheck:
      disable: false
    restart: "no"

  immich-test-postgres:
    container_name: immich-test-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - immich-test-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --dbname=immich --username=postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: "no"

  immich-test-redis:
    container_name: immich-test-redis
    image: docker.io/valkey/valkey:9-alpine
    networks:
      - immich-test-net
    command: valkey-server --save "" --appendonly no
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "no"

networks:
  immich-test-net:
    name: immich-test-net

volumes:
  immich-test-uploads:
    name: immich-test-uploads
