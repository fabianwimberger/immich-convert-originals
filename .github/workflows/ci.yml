name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff mypy types-requests

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Format check with ruff
        run: ruff format --check app/ tests/

      - name: Type check with mypy
        run: mypy app/ tests/ --ignore-missing-imports --explicit-package-bases

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -m "not integration" -v --cov=app --cov-report=xml --cov-fail-under=85

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t immich-convert-originals:test .

      - name: Test container starts
        run: |
          docker run --rm --entrypoint python3 immich-convert-originals:test -c \
            "import main; print('imports OK')"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Pick free port
        id: port
        run: |
          python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()" > port.txt
          echo "port=$(cat port.txt)" >> "$GITHUB_OUTPUT"

      - name: Build test runner image
        run: docker build -t immich-convert-test-runner -f tests/integration/Dockerfile.runner .

      - name: Start Immich test stack
        env:
          IMMICH_TEST_PORT: ${{ steps.port.outputs.port }}
          COMPOSE_PROJECT_NAME: immich-convert-test
        run: |
          docker compose -f tests/integration/docker-compose.test.yml -p immich-convert-test up -d

      - name: Wait for Immich healthy
        env:
          IMMICH_TEST_PORT: ${{ steps.port.outputs.port }}
        run: |
          curl --retry 30 --retry-delay 5 --retry-all-errors \
            http://127.0.0.1:$IMMICH_TEST_PORT/api/server/ping

      - name: Run integration tests
        run: |
          docker run --rm \
            --network immich-test-net \
            -v "$PWD:/workspace" \
            -e IMMICH_TEST_API_BASE=http://immich-test-server:2283/api/ \
            immich-convert-test-runner \
            pytest tests/ -m integration -v

      - name: Tear down stack
        if: always()
        env:
          IMMICH_TEST_PORT: ${{ steps.port.outputs.port }}
          COMPOSE_PROJECT_NAME: immich-convert-test
        run: |
          docker compose -f tests/integration/docker-compose.test.yml -p immich-convert-test down -v
          docker network rm immich-test-net || true
