services:
  immich-library-converter:
    # Option 1: Build locally (default)
    build: .
    image: immich-library-converter:local

    # Option 2: Use prebuilt image from GitHub Container Registry
    # Uncomment the line below and comment out the 'build' and 'image' lines above
    # image: ghcr.io/fabianwimberger/immich-convert-originals:main

    container_name: immich-library-converter
    # Everything (Immich connection, encoding defaults, output mode) is
    # configured from the Settings page after the container starts -- no
    # .env file needed. These are the only env vars the app reads, and only
    # for infrastructure that has to exist before the database is reachable.
    # environment:
    #   - LOG_LEVEL=INFO
    #   - DATABASE_PATH=/app/data/app.db
    #   - TEMP_DIR=/app/temp
    ports:
      - "8000:8000"
    restart: unless-stopped
    # ffmpeg and ImageMagick use shared memory for large frame buffers
    shm_size: 1G
    volumes:
      # Persists settings.db (connection + encoding defaults, run history)
      # across restarts. Not required, but you'll lose the Settings page
      # config and run history without it.
      - ./data:/app/data
